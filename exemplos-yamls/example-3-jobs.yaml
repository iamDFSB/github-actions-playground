on: pull_request

jobs:
  test:
    name: Testando o código
    runs-on: ubuntu-latest
  
    steps:
      - uses: actions/checkout@v4
      - name: Run Tests
        run: npm test
  
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to production
        run: echo "Deploying to production..."
